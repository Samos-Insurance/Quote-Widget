name: Release Widget (NPM & S3)

on:
  push:
    branches:
      - develop
      - main

jobs:
  # ==========================================
  # JOB 1: Check for Version Change
  # ==========================================
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.compare.outputs.changed }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2 

      - name: Compare package.json versions
        id: compare
        run: |
          OLD_VERSION=$(git show HEAD~1:package.json 2>/dev/null | grep '"version"' | head -1 | awk -F'"' '{print $4}' || echo "none")
          NEW_VERSION=$(node -p "require('./package.json').version")
          
          if [ "$OLD_VERSION" != "$NEW_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  # ==========================================
  # JOB 2: Build, Sign, and Deploy
  # ==========================================
  deploy:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    name: Deploy Widget
    runs-on: ubuntu-latest
    permissions:
      id-token: write 
      contents: read
    
    strategy:
      max-parallel: 1
      matrix:
        environment: [dev, prod]
        include:
          - environment: dev
            branch: refs/heads/develop
            BASE_URL: ${{ vars.DEV_BASE_URL }}
            CDN_DOMAIN: ${{ vars.DEV_CDN }}
          
          - environment: prod
            branch: refs/heads/main
            BASE_URL: ${{ vars.PROD_BASE_URL }}
            CDN_DOMAIN: ${{ vars.PROD_CDN }}

    steps:
      - name: Checkout Code
        if: github.ref == matrix.branch
        uses: actions/checkout@v3

      - name: Setup Node.js
        if: github.ref == matrix.branch
        uses: actions/setup-node@v3
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org' 
          cache: 'npm'

      - name: Install Dependencies & Build
        if: github.ref == matrix.branch
        run: |
          npm ci
          # Pass the mapped matrix variables directly into the build script
          BUILD_ENV=${{ matrix.environment }} BASE_URL=${{ matrix.BASE_URL }} npm run build 

      - name: Generate SRI Hash for CDN
        if: github.ref == matrix.branch
        id: sri
        run: |
          VERSION=$(node -p "require('./package.json').version")
          FILE_PATH="v$VERSION/widget.js"
          FULL_PATH="dist/${{ matrix.environment }}/$FILE_PATH"
          
          HASH=$(cat $FULL_PATH | openssl dgst -sha384 -binary | openssl base64 -A)
          
          echo "file_path=$FILE_PATH" >> $GITHUB_OUTPUT
          echo "sri_hash=sha384-$HASH" >> $GITHUB_OUTPUT
          
          echo "sha384-$HASH" > $FULL_PATH.sri.txt

      - name: Sign S3 File with Sigstore
        if: github.ref == matrix.branch
        run: |
          npm install -g @sigstore/cli
          sigstore sign dist/${{ matrix.environment }}/${{ steps.sri.outputs.file_path }} --out dist/${{ matrix.environment }}/${{ steps.sri.outputs.file_path }}.sig

      - name: Publish to NPM with Provenance
        # Double condition: Must match the branch AND only publish to NPM on the prod run
        if: github.ref == matrix.branch && matrix.environment == 'prod'
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} 

      - name: Deploy to S3 via Serverless
        if: github.ref == matrix.branch
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          npx serverless deploy --stage ${{ matrix.environment }}

      - name: Print Implementation Snippet
        if: github.ref == matrix.branch
        run: |
          echo "========================================================"
          echo "✅ Release Successful for Environment: ${{ matrix.environment }}"
          echo "Provide this exact snippet to partners using the CDN:"
          echo ""
          echo "<script src=\"https://${{ matrix.CDN_DOMAIN }}/${{ steps.sri.outputs.file_path }}\" integrity=\"${{ steps.sri.outputs.sri_hash }}\" crossorigin=\"anonymous\"></script>"
          echo "========================================================"
